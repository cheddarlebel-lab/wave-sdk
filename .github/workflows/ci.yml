name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract-and-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Contract tests
        working-directory: contract
        run: deno test --allow-read

      - name: Drift guard (all platforms vs contract)
        run: node codegen/check.mjs

      - name: MCP server
        working-directory: packages/mcp
        run: npm ci && npm test && npm run build

      - name: Web SDK
        working-directory: packages/web
        run: npm ci && npm test && npm run build

      - name: React Native bridge
        working-directory: packages/react-native
        run: npm ci && npm test && npm run build

  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: gradle/actions/setup-gradle@v4
      - name: Kotlin core tests
        working-directory: packages/kotlin
        run: gradle test --no-daemon

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: Flutter tests
        working-directory: packages/flutter
        run: flutter pub get && flutter test && flutter analyze

  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift tests
        working-directory: packages/swift
        run: swift test
