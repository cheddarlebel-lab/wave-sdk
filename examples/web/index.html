<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wave Unlock — web example</title>
  <style>
    body { font: 16px system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; color: #111; }
    button { font: inherit; font-weight: 600; padding: 14px 20px; border-radius: 12px; border: 1px solid #ccc; background: #f4f6f9; cursor: pointer; width: 100%; margin: 8px 0; }
    button.primary { background: linear-gradient(90deg,#35d07f,#46b0ff); color: #04121a; border: none; }
    pre { background: #0b0f14; color: #e6edf3; padding: 14px; border-radius: 10px; overflow-x: auto; min-height: 60px; }
  </style>
</head>
<body>
  <h1>Wave Unlock — web example</h1>
  <p>The <b>Simulate</b> button runs the whole grant/deny flow against the live gateway with no hardware. <b>Unlock a real door</b> uses Web Bluetooth (Chrome/Edge, https, near a reader).</p>
  <button class="primary" id="sim">Simulate unlock (no hardware)</button>
  <button id="real">Unlock a real door (Web Bluetooth)</button>
  <pre id="log">ready.</pre>

  <script type="module">
    const WAVE = {
      gatewayUrl: "https://zuijamqvgxvajvhrdnlx.supabase.co/functions/v1",
      anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1aWphbXF2Z3h2YWp2aHJkbmx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzI2NTUsImV4cCI6MjA4ODMwODY1NX0.KswD9UTeooxK9J3J-uJIZCCI_uLnRcJK9z2gLY5qaxg",
      testKey: "wave_test_9097529120bb93a92d058d65007fb555", // demo; test-mode only
      userNumber: "10001",
      serviceUuid: "496b2c43-b05e-4a9a-9592-535173b7ab51",
      writeCharacteristic: "995b637f-13f2-4335-96f5-5541ecfce219",
    };
    const log = (m) => (document.getElementById("log").textContent = m);
    const H = (t) => ({ "Content-Type": "application/json", apikey: WAVE.anonKey, ...(t ? { Authorization: "Bearer " + t } : {}) });
    const token = async (key) => (await (await fetch(WAVE.gatewayUrl + "/partner-auth/token", { method: "POST", headers: H(), body: JSON.stringify({ key }) })).json()).token;

    document.getElementById("sim").onclick = async () => {
      log("minting token…");
      const t = await token(WAVE.testKey);
      log("emitting granted scenario…");
      await fetch(WAVE.gatewayUrl + "/unlock-mock", { method: "POST", headers: H(t), body: JSON.stringify({ card_id: WAVE.userNumber, scenario: "granted" }) });
      const r = await (await fetch(WAVE.gatewayUrl + "/unlock-stream", { method: "POST", headers: H(t), body: JSON.stringify({ card_id: WAVE.userNumber }) })).json();
      log("result: " + JSON.stringify(r));
    };

    document.getElementById("real").onclick = async () => {
      try {
        log("scanning…");
        const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: "SKBluTag" }], optionalServices: [WAVE.serviceUuid] });
        const server = await device.gatt.connect();
        const svc = await server.getPrimaryService(WAVE.serviceUuid);
        const ch = await svc.getCharacteristic(WAVE.writeCharacteristic);
        await ch.writeValueWithoutResponse(new Uint8Array([0x01, ...new TextEncoder().encode(WAVE.userNumber)]));
        setTimeout(() => server.disconnect(), 1500);
        log("written — awaiting confirmation…");
        const t = await token(WAVE.testKey);
        const deadline = Date.now() + 5000;
        while (Date.now() < deadline) {
          const r = await (await fetch(WAVE.gatewayUrl + "/unlock-stream", { method: "POST", headers: H(t), body: JSON.stringify({ card_id: WAVE.userNumber }) })).json();
          if (r.status !== "pending") return log("result: " + JSON.stringify(r));
          await new Promise((res) => setTimeout(res, 500));
        }
        log("timed out");
      } catch (e) { log("error: " + e.message); }
    };
  </script>
</body>
</html>
