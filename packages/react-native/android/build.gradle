// Android module for @wave/unlock-react-native. Bridges the Kotlin core (wave-unlock)
// to React Native. Built by the host app's Gradle when the package is installed.
buildscript {
  repositories { google(); mavenCentral() }
  dependencies {
    classpath "com.android.tools.build:gradle:8.2.1"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.0"
  }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
  namespace "com.wave.unlock.rn"
  compileSdk 34
  defaultConfig { minSdk 26 }
  sourceSets { main { java.srcDirs = ["src/main/kotlin"] } }
}

repositories { google(); mavenCentral() }

dependencies {
  implementation "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"
  // The Kotlin core (published to Maven / included build).
  implementation "com.wave:wave-unlock:+"
}
